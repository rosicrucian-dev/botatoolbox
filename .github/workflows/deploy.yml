name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Binary assets live directly in git (no LFS) — a plain checkout
      # gets everything, and clone bandwidth is unmetered.
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Guard against shipping a stale search index on a direct push to main
      # (CI skips main). Mirrors ci.yml — regenerate the committed indexes from
      # content and fail on drift.
      - name: Verify prebuilt search indexes are current
        run: |
          npm run gen:search
          git diff --exit-code -- public/data/ || {
            echo "::error::Search indexes are stale — run 'npm run gen:search' and commit public/data/*.json";
            exit 1;
          }
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
