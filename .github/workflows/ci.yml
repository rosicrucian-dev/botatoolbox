name: CI

# Validates contributions before merge: typecheck plus a full production
# build, which runs every Zod parse, the cross-file integrity checks, and
# the static export. This is the contributor-facing counterpart of the
# deploy workflow (which only runs on push to main).
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Binary assets live directly in git (no LFS) — a plain checkout
      # gets real files, so the integrity existence checks see the truth.
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      # The prebuilt search indexes (public/data/*-search*.json) are committed
      # artifacts, not built by `npm run build`. Regenerate them from the
      # committed content and fail if they differ — i.e. someone edited a
      # transcript or the Book of Tokens without rerunning `npm run gen:search`.
      # (Recordings timings need the off-repo Whisper pipeline, so they can't be
      # verified here; they fail safe at runtime instead.)
      - name: Verify prebuilt search indexes are current
        run: |
          npm run gen:search
          git diff --exit-code -- public/data/ || {
            echo "::error::Search indexes are stale — run 'npm run gen:search' and commit public/data/*.json";
            exit 1;
          }
      - run: npm run build
